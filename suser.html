<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月儿接码系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(20, 25, 45, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
        }

        h1 {
            color: #00ffff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #00ffff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .phone-display {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 46px;
        }

        .phone-number {
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
        }

        .copy-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #00ffff 100%);
            color: #0a0e27;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #00ff88 0%, #00ffcc 100%);
            color: #0a0e27;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-box {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            padding: 20px;
            min-height: 100px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-success {
            color: #00ff00;
            line-height: 1.6;
        }

        .result-error {
            color: #ff4444;
            line-height: 1.6;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-indicator {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .status-text {
            color: #00ffff;
            font-size: 14px;
            white-space: nowrap;
            font-weight: bold;
        }

        .status-description {
            color: #aaa;
            font-size: 13px;
            line-height: 1.5;
        }

        .placeholder {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>月儿接码系统</h1>
        <p class="subtitle">秒级响应受丝滑</p>

        <div class="form-group">
            <label>卡密</label>
            <input type="text" id="cardInput" placeholder="请输入卡密">
        </div>

        <div class="form-group">
            <label>通道选择</label>
            <select id="channelSelect">
                <option value="">正在加载通道...</option>
            </select>
        </div>

        <div class="form-group">
            <label>手机号</label>
            <div class="phone-display">
                <span id="phoneNumber" class="placeholder">点击下方按钮获取验证码</span>
                <button class="copy-btn" id="copyPhoneBtn" style="display: none;">复制</button>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="getPhoneBtn">
                <span>📱 获取号码</span>
            </button>
            <button class="btn-secondary" id="getCodeBtn" disabled>
                <span>🔍 取验证码</span>
            </button>
        </div>

        <div class="form-group">
            <label>验证码</label>
            <div class="phone-display">
                <span id="codeNumber" class="placeholder">获取手机号后点击取验证码</span>
                <button class="copy-btn" id="copyCodeBtn" style="display: none;">复制</button>
            </div>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <div class="status-indicator">
            <span class="status-text">使用说明：</span>
            <span class="status-description">填写卡密选择通道后，获取手机号，取到后在小红书APP点击发送验证码，等待3秒以上再点获取验证码，如果提示取码失败，重新取号再次尝试</span>
        </div>
    </div>

    <script>
        let currentPhone = '';
        let currentCard = '';
        let currentChannel = '';
        let currentCode = '';

        // 加载通道列表
        async function loadChannels() {
            try {
                const response = await fetch('api/xhs_get_channels.php');
                
                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                
                const text = await response.text();
                console.log('API响应:', text);
                
                // 尝试解析JSON
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    console.error('JSON解析失败:', text);
                    throw new Error('服务器返回了无效的JSON: ' + text.substring(0, 100));
                }
                
                const select = document.getElementById('channelSelect');
                if (data.success) {
                    select.innerHTML = '<option value="">请选择通道</option>';
                    data.channels.forEach(channel => {
                        const option = document.createElement('option');
                        option.value = channel;
                        option.textContent = channel;
                        select.appendChild(option);
                    });
                } else {
                    console.error('API错误:', data.error);
                    if (data.trace) {
                        console.error('错误堆栈:', data.trace);
                    }
                    select.innerHTML = '<option value="">加载失败: ' + data.error + '</option>';
                }
            } catch (error) {
                console.error('加载通道失败:', error);
                const select = document.getElementById('channelSelect');
                select.innerHTML = '<option value="">加载失败，请刷新</option>';
            }
        }

        // 获取手机号
        async function getPhone() {
            const card = document.getElementById('cardInput').value.trim();
            const channel = document.getElementById('channelSelect').value;
            
            if (!card) {
                alert('请输入卡密');
                return;
            }
            
            if (!channel) {
                alert('请选择通道');
                return;
            }

            const btn = document.getElementById('getPhoneBtn');
            const btnText = btn.querySelector('span');
            const originalText = btnText.innerHTML;
            
            btn.disabled = true;
            btnText.innerHTML = '正在获取<span class="loading"></span>';
            
            try {
                const response = await fetch('api/xhs_get_phone.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ card, channel })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentPhone = data.phone;
                    currentCard = card;
                    currentChannel = channel;
                    
                    const phoneEl = document.getElementById('phoneNumber');
                    phoneEl.textContent = data.phone;
                    phoneEl.className = 'phone-number';
                    
                    document.getElementById('copyPhoneBtn').style.display = 'block';
                    document.getElementById('getCodeBtn').disabled = false;
                    
                    // 重置验证码显示
                    const codeEl = document.getElementById('codeNumber');
                    codeEl.textContent = '点击取验证码按钮获取';
                    codeEl.className = 'placeholder';
                    document.getElementById('copyCodeBtn').style.display = 'none';
                    currentCode = '';
                    
                    showResult('success', `✓ 成功获取手机号: ${data.phone}`);
                } else {
                    if (data.error === '卡密无效') {
                        alert('卡密无效，请检查后重试');
                    }
                    showResult('error', `✗ ${data.error}`);
                }
            } catch (error) {
                showResult('error', `✗ 请求失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btnText.innerHTML = originalText;
            }
        }

        // 获取验证码
        async function getCode() {
            if (!currentPhone) {
                alert('请先获取手机号');
                return;
            }

            const btn = document.getElementById('getCodeBtn');
            const btnText = btn.querySelector('span');
            const originalText = btnText.innerHTML;
            
            btn.disabled = true;
            btnText.innerHTML = '正在获取<span class="loading"></span>';
            
            try {
                const response = await fetch('api/xhs_get_code.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        card: currentCard,
                        channel: currentChannel,
                        phone: currentPhone
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 提取验证码（假设验证码是6位数字）
                    const codeMatch = data.message.match(/\d{4,6}/);
                    const extractedCode = codeMatch ? codeMatch[0] : '';
                    
                    currentCode = extractedCode;
                    
                    const codeEl = document.getElementById('codeNumber');
                    if (extractedCode) {
                        codeEl.textContent = extractedCode;
                        codeEl.className = 'phone-number';
                        document.getElementById('copyCodeBtn').style.display = 'block';
                    } else {
                        codeEl.textContent = '未识别到验证码';
                        codeEl.className = 'placeholder';
                    }
                    
                    showResult('success', `✓ 取码成功\n\n${data.message}`);
                } else {
                    if (data.error === '取码失败，请更换手机号') {
                        showResult('error', '✗ 取码失败，请更换手机号');
                    } else {
                        showResult('error', `✗ ${data.error}`);
                    }
                    
                    const codeEl = document.getElementById('codeNumber');
                    codeEl.textContent = '取码失败';
                    codeEl.className = 'placeholder';
                    document.getElementById('copyCodeBtn').style.display = 'none';
                }
            } catch (error) {
                showResult('error', `✗ 请求失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btnText.innerHTML = originalText;
            }
        }

        // 复制手机号
        function copyPhone() {
            if (currentPhone) {
                navigator.clipboard.writeText(currentPhone).then(() => {
                    const btn = document.getElementById('copyPhoneBtn');
                    const originalText = btn.textContent;
                    btn.textContent = '已复制';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 1500);
                });
            }
        }

        // 复制验证码
        function copyCode() {
            if (currentCode) {
                navigator.clipboard.writeText(currentCode).then(() => {
                    const btn = document.getElementById('copyCodeBtn');
                    const originalText = btn.textContent;
                    btn.textContent = '已复制';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 1500);
                });
            }
        }

        // 显示结果
        function showResult(type, message) {
            const box = document.getElementById('resultBox');
            const content = document.getElementById('resultContent');
            
            content.className = type === 'success' ? 'result-success' : 'result-error';
            content.textContent = message;
            box.classList.add('show');
        }

        // 事件监听
        document.getElementById('getPhoneBtn').addEventListener('click', getPhone);
        document.getElementById('getCodeBtn').addEventListener('click', getCode);
        document.getElementById('copyPhoneBtn').addEventListener('click', copyPhone);
        document.getElementById('copyCodeBtn').addEventListener('click', copyCode);

        // 页面加载时获取通道列表
        loadChannels();
    </script>
</body>
</html>
